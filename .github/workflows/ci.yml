name: ci

on:
  push:
    branches:
      - master
      - main
      - dev
  pull_request:
    branches:
      - master
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Smoke validate fixture
        run: node bin/cli.mjs validate tests/fixtures/minimal-bundle

      - name: Smoke optimize fixture
        run: |
          node bin/cli.mjs optimize \
            --in tests/fixtures/minimal-bundle \
            --out /tmp/emi-opt-smoke
          node bin/cli.mjs validate /tmp/emi-opt-smoke
