name: Publish npm package

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Validate release tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [ -z "$TAG" ]; then
            echo "Release tag is required."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Verify tag exists in repository
        run: |
          TAG="${{ github.event.release.tag_name }}"
          git rev-parse --verify "refs/tags/${TAG}" >/dev/null

      - name: Ensure package version matches tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_NO_V="${TAG#v}"
          if [ "$PKG_VERSION" != "$TAG_NO_V" ]; then
            echo "Tag (${TAG}) does not match package.json version (${PKG_VERSION})."
            exit 1
          fi

      - name: Check if version already published
        id: published
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version ${PKG_NAME}@${PKG_VERSION} already exists on npm; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version ${PKG_NAME}@${PKG_VERSION} not found on npm; publishing."
          fi

      - name: Publish to npm
        if: steps.published.outputs.exists == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
